name: Keep Streamlit App Awake

on:
  schedule:
    # 每天的 00:00, 06:00, 12:00, 18:00 (UTC 格式) 運行一次，即每 6 小時
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允許您在 GitHub 頁面上手動點擊執行測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive ping to Streamlit Cloud
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://nhi-cancer-drug-app-dnojihfaj7gvfgx2zkta93.streamlit.app/
